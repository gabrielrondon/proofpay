app = "proofpay"
primary_region = "gru"

[build]

[env]
  PROOFPAY_BIND = "0.0.0.0:3402"
  STELLAR_NETWORK = "stellar:testnet"
  PAYMENT_ASSET = "native"
  PAYMENT_AMOUNT_STROOPS = "1000000"
  ACCESS_DESCRIPTION = "Access to ZK-verified agent resource"
  X402_FACILITATOR_URL = "https://channels.openzeppelin.com/x402/testnet"
  # Toggle to "true" to accept example-agent payments without a live facilitator.
  X402_MOCK = "false"

[http_service]
  internal_port = 3402
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
